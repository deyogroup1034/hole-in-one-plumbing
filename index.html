<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hole in One Plumbing — Dallas/Ft. Worth Plumber</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue-900: #002a52;
    --blue-800: #003d74;
    --blue-700: #0a4c89;
    --blue-600: #1565a8;
    --blue-500: #2f7bc4;
    --green: #048139;
    --green-600: #0a7d3c;
    --green-700: #056b32;
    --green-tint: #e9f4ec;
    --blue-tint: #eaf1f8;

    --ink: #0f1722;
    --slate-800: #1f2c3a;
    --slate-700: #38485a;
    --slate-500: #647386;
    --slate-400: #8d9aab;
    --line: #e4eaf0;
    --line-strong: #d4dde6;
    --paper: #f5f8fb;
    --white: #ffffff;

    --primary: var(--blue-700);
    --primary-dark: var(--blue-800);

    --font-display: 'Archivo', system-ui, sans-serif;
    --font-body: 'Manrope', system-ui, sans-serif;

    --shadow-sm: 0 1px 2px rgba(15,23,34,.06), 0 1px 3px rgba(15,23,34,.04);
    --shadow-md: 0 4px 16px rgba(15,23,34,.08), 0 2px 6px rgba(15,23,34,.05);
    --shadow-lg: 0 18px 48px rgba(15,23,34,.14), 0 6px 16px rgba(15,23,34,.08);
    --shadow-blue: 0 14px 34px rgba(10,76,137,.28);

    --r-sm: 8px;
    --r-md: 14px;
    --r-lg: 22px;
    --r-pill: 999px;

    --maxw: 1200px;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--font-body);
    color: var(--slate-700);
    background: var(--white);
    font-size: 17px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  h1,h2,h3,h4 { font-family: var(--font-display); color: var(--ink); margin: 0; line-height: 1.04; letter-spacing: -0.02em; }
  p { margin: 0; }
  a { color: inherit; text-decoration: none; }
  img { display: block; max-width: 100%; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

  .eyebrow {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--green-600);
    display: inline-flex;
    align-items: center;
    gap: 9px;
  }
  .eyebrow::before { content:""; width: 22px; height: 2px; background: var(--green); border-radius: 2px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    font-family: var(--font-display); font-weight: 700; font-size: 16px;
    padding: 15px 26px; border-radius: var(--r-pill);
    transition: transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
    white-space: nowrap; line-height: 1;
  }
  .btn svg { width: 18px; height: 18px; }
  .btn-primary { background: var(--primary); color: #fff; box-shadow: var(--shadow-blue); }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 18px 40px rgba(10,76,137,.34); }
  .btn-green { background: var(--green); color: #fff; box-shadow: 0 14px 34px rgba(4,129,57,.26); }
  .btn-green:hover { background: var(--green-700); transform: translateY(-2px); box-shadow: 0 18px 40px rgba(4,129,57,.32); }
  .btn-ghost { background: #fff; color: var(--primary); box-shadow: inset 0 0 0 1.5px var(--line-strong); }
  .btn-ghost:hover { box-shadow: inset 0 0 0 1.5px var(--primary); transform: translateY(-2px); }
  .btn-lg { font-size: 17px; padding: 17px 30px; }

  /* Stock-style image placeholder */
  .ph {
    position: relative; overflow: hidden; border-radius: var(--r-md);
    background:
      repeating-linear-gradient(135deg, rgba(10,76,137,.05) 0 14px, rgba(10,76,137,.09) 14px 28px),
      linear-gradient(180deg, var(--blue-tint), #fff);
    display: flex; align-items: center; justify-content: center;
    color: var(--blue-600);
  }
  .ph span {
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 12px; letter-spacing: .04em; text-transform: uppercase;
    background: rgba(255,255,255,.86); padding: 7px 12px; border-radius: var(--r-pill);
    box-shadow: var(--shadow-sm); color: var(--slate-500);
  }

  section { position: relative; }

  /* reveal on scroll */
  .reveal { opacity: 0; transform: translateY(22px); transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity:1 !important; transform:none !important; } html{scroll-behavior:auto;} }

  #root { overflow: clip; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="parts/shared.jsx"></script>
<script type="text/babel" src="parts/sections1.jsx"></script>
<script type="text/babel" src="parts/sections2.jsx"></script>
<script type="text/babel" src="parts/app.jsx"></script>
</body>
</html>
